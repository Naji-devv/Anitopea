    <style>
        /* Global Styles */
        
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #1a1a1a, #000033, #330000);
            color: white;
            overflow-x: hidden;
        }
        /* Navbar */
        
        nav {
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6), 0 0 25px rgba(0, 0, 255, 0.6);
        }
        
        nav .logo {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #0000ff;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }
        
        nav ul li {
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }
        
        nav ul li:hover {
            color: #ff3333;
            text-shadow: 0 0 10px #0000ff;
        }
        /* Anime Grid */
        
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px;
        }
        
        .anime-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4), 0 0 40px rgba(0, 0, 255, 0.4);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
        }
        
        .anime-card:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.8), 0 0 60px rgba(0, 0, 255, 0.8);
        }
        
        .anime-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }
        
        .anime-card h3 {
            text-align: center;
            padding: 15px;
            font-size: 1.3rem;
            background: linear-gradient(90deg, rgba(255, 0, 0, 0.6), rgba(0, 0, 255, 0.6));
            margin: 0;
        }
        /* Aura Glow Effect */
        
        .aura {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.3), rgba(0, 0, 255, 0.3), transparent);
            animation: auraMove 6s infinite linear;
            z-index: -1;
        }
        
        @keyframes auraMove {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.2);
            }
            100% {
                transform: rotate(360deg) scale(1);
            }
        }
    </style>
</head>

        <script>
            // Navbar Interaction
            const navItems = document.querySelectorAll('nav ul li');
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    alert(`Navigating to ${item.dataset.section} section...`);
                });
            });

            // Aura Interaction
            const cards = document.querySelectorAll('.anime-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', e => {
                    const aura = card.querySelector('.aura');
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    aura.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,0,0,0.4), rgba(0,0,255,0.4), transparent)`;
                });
            });
        </script>
